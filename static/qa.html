<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Test Case Architect Agent</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .json-output { font-family: monospace; white-space: pre-wrap; }
</style>
</head>
<body class="bg-gray-50 text-gray-800">
<div class="container mx-auto p-4 max-w-4xl">
  <header class="mb-6">
    <h1 class="text-2xl font-bold">Test Case Architect Agent</h1>
    <p class="text-sm text-gray-600">Genera casos de prueba usando técnicas QA (equivalencia, límites, decisión, estados, riesgo, regresión).</p>
  </header>

  <form id="qaForm" class="space-y-4">
    <div>
      <label for="story" class="block text-sm font-medium">Historia de usuario *</label>
      <textarea id="story" rows="3" class="w-full border rounded p-2" required></textarea>
    </div>

    <div>
      <label for="acceptance_criteria" class="block text-sm font-medium">Criterios de aceptación</label>
      <textarea id="acceptance_criteria" rows="2" class="w-full border rounded p-2"></textarea>
    </div>

    <div>
      <label for="business_rules" class="block text-sm font-medium">Reglas de negocio</label>
      <textarea id="business_rules" rows="2" class="w-full border rounded p-2"></textarea>
    </div>

    <div>
      <label for="historical_bugs" class="block text-sm font-medium">Bugs históricos</label>
      <textarea id="historical_bugs" rows="2" class="w-full border rounded p-2"></textarea>
    </div>

    <div>
      <label for="top_k" class="block text-sm font-medium">Top K (documentos recuperados)</label>
      <input type="number" id="top_k" min="1" max="20" value="5" class="border rounded p-2 w-20">
    </div>

    <div class="flex gap-2">
      <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Generar casos</button>
      <button type="button" id="exportJson" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Exportar JSON</button>
      <button type="button" id="exportCsv" class="bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700">Exportar CSV</button>
    </div>
  </form>

  <div id="status" class="mt-4 text-sm"></div>

  <section id="outputSection" class="mt-6 hidden">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-semibold">Casos de prueba generados</h2>
      <div class="flex gap-2">
        <input type="text" id="searchInput" placeholder="Buscar casos..." class="border rounded px-2 py-1 text-sm">
        <select id="categoryFilter" class="border rounded px-2 py-1 text-sm">
          <option value="">Todas las categorías</option>
          <option value="positive">Positivos</option>
          <option value="negative">Negativos</option>
          <option value="boundary">Límite</option>
          <option value="state_transition">Transición de estado</option>
          <option value="regression">Regresión</option>
          <option value="high_risk">Alto riesgo</option>
        </select>
        <select id="priorityFilter" class="border rounded px-2 py-1 text-sm">
          <option value="">Todas las prioridades</option>
          <option value="P0">P0</option>
          <option value="P1">P1</option>
          <option value="P2">P2</option>
        </select>
      </div>
    </div>

    <!-- Decision Table -->
    <div id="decisionTableSection" class="mb-6 hidden">
      <h3 class="text-lg font-semibold mb-2">Tabla de decisiones</h3>
      <div class="overflow-x-auto border rounded">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr id="decisionTableHeaders"></tr>
          </thead>
          <tbody id="decisionTableRows" class="bg-white divide-y divide-gray-200"></tbody>
        </table>
      </div>
    </div>

    <!-- Conditions -->
    <div id="conditionsSection" class="mb-6 hidden">
      <h3 class="text-lg font-semibold mb-2">Condiciones identificadas</h3>
      <div id="conditionsList" class="space-y-3"></div>
    </div>

    <!-- Test Cases Cards -->
    <div id="testCasesContainer" class="space-y-4"></div>

    <!-- Raw JSON (collapsible) -->
    <details class="mt-6 border rounded p-4 bg-gray-50">
      <summary class="cursor-pointer font-medium">Ver JSON crudo</summary>
      <pre id="jsonOutput" class="json-output mt-2 text-xs overflow-auto max-h-64"></pre>
    </details>
  </section>
</div>

<script>
const API_BASE = 'http://127.0.0.1:8000';
let lastResult = null;
let allTestCases = [];

function renderDecisionTable(table) {
  const section = document.getElementById('decisionTableSection');
  const headersEl = document.getElementById('decisionTableHeaders');
  const rowsEl = document.getElementById('decisionTableRows');
  if (!table || !table.applicable) {
    section.classList.add('hidden');
    return;
  }
  section.classList.remove('hidden');
  headersEl.innerHTML = table.headers.map(h => `<th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">${h}</th>`).join('');
  rowsEl.innerHTML = table.rows.map(row => `<tr>${row.map(cell => `<td class="px-4 py-2 text-sm text-gray-900">${cell}</td>`).join('')}</tr>`).join('');
}

function renderConditions(conditions) {
  const section = document.getElementById('conditionsSection');
  const listEl = document.getElementById('conditionsList');
  if (!conditions || conditions.length === 0) {
    section.classList.add('hidden');
    return;
  }
  section.classList.remove('hidden');
  listEl.innerHTML = conditions.map(c => `
    <div class="border rounded p-3 bg-gray-50">
      <h4 class="font-medium text-sm">${c.name}</h4>
      <p class="text-xs text-gray-600 mt-1">${c.description}</p>
      <div class="mt-2">
        <strong class="text-xs">Particiones:</strong>
        <ul class="text-xs list-disc list-inside">${c.equivalence_partitions.map(p => `<li>${p}</li>`).join('')}</ul>
      </div>
      <div class="mt-1">
        <strong class="text-xs">Valores límite:</strong>
        <ul class="text-xs list-disc list-inside">${c.boundary_values.map(v => `<li>${v}</li>`).join('')}</ul>
      </div>
      ${c.notes ? `<p class="text-xs text-gray-500 mt-1"><strong>Notas:</strong> ${c.notes}</p>` : ''}
    </div>
  `).join('');
}

function categoryColor(cat) {
  const colors = {
    positive: 'bg-green-100 border-green-300',
    negative: 'bg-red-100 border-red-300',
    boundary: 'bg-yellow-100 border-yellow-300',
    state_transition: 'bg-blue-100 border-blue-300',
    regression: 'bg-purple-100 border-purple-300',
    high_risk: 'bg-orange-100 border-orange-300'
  };
  return colors[cat] || 'bg-gray-100 border-gray-300';
}

function priorityBadge(p) {
  const colors = { P0: 'bg-red-600', P1: 'bg-orange-500', P2: 'bg-yellow-500' };
  return `<span class="inline-block px-2 py-1 text-xs text-white rounded ${colors[p] || 'bg-gray-500'}">${p}</span>`;
}

function renderTestCaseCard(tc) {
  return `
    <div class="border rounded p-4 ${categoryColor(tc.category)}" data-id="${tc.id}" data-category="${tc.category}" data-priority="${tc.priority}">
      <div class="flex justify-between items-start mb-2">
        <h3 class="font-semibold text-sm">${tc.id} - ${tc.title}</h3>
        ${priorityBadge(tc.priority)}
      </div>
      <div class="text-xs text-gray-600 mb-2">
        <span class="inline-block px-2 py-1 bg-gray-200 rounded mr-1">${tc.category}</span>
        ${tc.technique_applied.map(t => `<span class="inline-block px-2 py-1 bg-blue-200 rounded mr-1">${t}</span>`).join('')}
      </div>
      <details class="mb-2">
        <summary class="cursor-pointer text-xs font-medium">Ver detalles</summary>
        <div class="mt-2 text-xs space-y-2">
          <div><strong>Precondiciones:</strong><ul>${tc.preconditions.map(p => `<li>${p}</li>`).join('')}</ul></div>
          <div><strong>Pasos:</strong><ol>${tc.steps.map(s => `<li>${s}</li>`).join('')}</ol></div>
          <div><strong>Resultado esperado:</strong> ${tc.expected_result}</div>
          ${tc.risk_rationale ? `<div><strong>Riesgo:</strong> ${tc.risk_rationale}</div>` : ''}
          ${tc.regression_links && tc.regression_links.length ? `<div><strong>Links regresión:</strong><ul>${tc.regression_links.map(l => `<li>${l}</li>`).join('')}</ul></div>` : ''}
          ${tc.integration_impact && tc.integration_impact.length ? `<div><strong>Impacto:</strong><ul>${tc.integration_impact.map(i => `<li>${i}</li>`).join('')}</ul></div>` : ''}
        </div>
      </details>
    </div>
  `;
}

function filterAndRender() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const catFilter = document.getElementById('categoryFilter').value;
  const priFilter = document.getElementById('priorityFilter').value;
  const filtered = allTestCases.filter(tc => {
    const matchSearch = !search || tc.title.toLowerCase().includes(search) || tc.expected_result.toLowerCase().includes(search);
    const matchCat = !catFilter || tc.category === catFilter;
    const matchPri = !priFilter || tc.priority === priFilter;
    return matchSearch && matchCat && matchPri;
  });
  document.getElementById('testCasesContainer').innerHTML = filtered.map(renderTestCaseCard).join('');
}

document.getElementById('qaForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const status = document.getElementById('status');
  const outputSection = document.getElementById('outputSection');
  const jsonOutput = document.getElementById('jsonOutput');

  status.textContent = 'Generando...';
  status.className = 'mt-4 text-sm text-blue-600';
  outputSection.classList.add('hidden');

  const payload = {
    story: document.getElementById('story').value,
    acceptance_criteria: document.getElementById('acceptance_criteria').value,
    business_rules: document.getElementById('business_rules').value,
    historical_bugs: document.getElementById('historical_bugs').value,
    top_k: parseInt(document.getElementById('top_k').value, 10)
  };

  try {
    const res = await fetch(`${API_BASE}/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || 'Error desconocido');
    }

    lastResult = await res.json();
    jsonOutput.textContent = JSON.stringify(lastResult, null, 2);
    outputSection.classList.remove('hidden');

    // Parse and render structured sections
    let parsed;
    try {
      parsed = JSON.parse(lastResult.raw);
      console.log('Parsed raw:', parsed);
    } catch (e) {
      console.error('Failed to parse raw JSON:', e);
      parsed = {};
    }
    renderDecisionTable(parsed.decision_table);
    renderConditions(parsed.conditions);
    allTestCases = parsed.test_cases || [];
    console.log('Test cases loaded:', allTestCases.length);
    filterAndRender();

    status.textContent = '✅ Generación completada';
    status.className = 'mt-4 text-sm text-green-600';
  } catch (ex) {
    status.textContent = `❌ Error: ${ex.message}`;
    status.className = 'mt-4 text-sm text-red-600';
  }
});

document.getElementById('searchInput').addEventListener('input', filterAndRender);
document.getElementById('categoryFilter').addEventListener('change', filterAndRender);
document.getElementById('priorityFilter').addEventListener('change', filterAndRender);

document.getElementById('exportJson').addEventListener('click', () => {
  if (!lastResult) return;
  const blob = new Blob([JSON.stringify(lastResult, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'test_cases.json';
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('exportCsv').addEventListener('click', () => {
  if (!lastResult || !lastResult.raw) return;
  let data;
  try {
    data = JSON.parse(lastResult.raw);
  } catch {
    alert('El resultado no es JSON válido para exportar a CSV');
    return;
  }
  const rows = [];
  rows.push(['ID', 'Título', 'Categoría', 'Prioridad', 'Técnica', 'Precondiciones', 'Pasos', 'Resultado esperado']);
  (data.test_cases || []).forEach(tc => {
    rows.push([
      tc.id || '',
      tc.title || '',
      tc.category || '',
      tc.priority || '',
      (tc.technique_applied || []).join(';'),
      (tc.preconditions || []).join(';'),
      (tc.steps || []).join(';'),
      tc.expected_result || ''
    ]);
  });
  const csv = rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'test_cases.csv';
  a.click();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>

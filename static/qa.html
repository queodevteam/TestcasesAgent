<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Test Case Architect Agent</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .json-output { font-family: monospace; white-space: pre-wrap; }
</style>
</head>
<body class="bg-gray-50 text-gray-800">
<div class="container mx-auto p-4 max-w-4xl">
  <header class="mb-6">
    <h1 class="text-2xl font-bold">Test Case Architect Agent</h1>
    <p class="text-sm text-gray-600">Genera casos de prueba usando técnicas QA (equivalencia, límites, decisión, estados, riesgo, regresión).</p>
  </header>

  <form id="qaForm" class="space-y-4">
    <div>
      <label for="story" class="block text-sm font-medium">Historia de usuario *</label>
      <textarea id="story" rows="3" class="w-full border rounded p-2" required></textarea>
    </div>

    <div>
      <label for="acceptance_criteria" class="block text-sm font-medium">Criterios de aceptación</label>
      <textarea id="acceptance_criteria" rows="2" class="w-full border rounded p-2"></textarea>
    </div>

    <div>
      <label for="business_rules" class="block text-sm font-medium">Reglas de negocio</label>
      <textarea id="business_rules" rows="2" class="w-full border rounded p-2"></textarea>
    </div>

    <div>
      <label for="historical_bugs" class="block text-sm font-medium">Bugs históricos</label>
      <textarea id="historical_bugs" rows="2" class="w-full border rounded p-2"></textarea>
    </div>

    <div>
      <label for="top_k" class="block text-sm font-medium">Top K (documentos recuperados)</label>
      <input type="number" id="top_k" min="1" max="20" value="5" class="border rounded p-2 w-20">
    </div>

    <div class="flex gap-2">
      <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Generar casos</button>
      <button type="button" id="exportJson" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Exportar JSON</button>
      <button type="button" id="exportCsv" class="bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700">Exportar CSV</button>
    </div>
  </form>

  <div id="status" class="mt-4 text-sm"></div>

  <section id="outputSection" class="mt-6 hidden">
    <h2 class="text-xl font-semibold mb-2">Resultado</h2>
    <pre id="jsonOutput" class="json-output bg-gray-100 border rounded p-4 max-h-96 overflow-auto"></pre>
  </section>
</div>

<script>
const API_BASE = 'http://127.0.0.1:8000';
let lastResult = null;

document.getElementById('qaForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const status = document.getElementById('status');
  const outputSection = document.getElementById('outputSection');
  const jsonOutput = document.getElementById('jsonOutput');

  status.textContent = 'Generando...';
  status.className = 'mt-4 text-sm text-blue-600';
  outputSection.classList.add('hidden');

  const payload = {
    story: document.getElementById('story').value,
    acceptance_criteria: document.getElementById('acceptance_criteria').value,
    business_rules: document.getElementById('business_rules').value,
    historical_bugs: document.getElementById('historical_bugs').value,
    top_k: parseInt(document.getElementById('top_k').value, 10)
  };

  try {
    const res = await fetch(`${API_BASE}/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || 'Error desconocido');
    }

    lastResult = await res.json();
    jsonOutput.textContent = JSON.stringify(lastResult, null, 2);
    outputSection.classList.remove('hidden');
    status.textContent = '✅ Generación completada';
    status.className = 'mt-4 text-sm text-green-600';
  } catch (ex) {
    status.textContent = `❌ Error: ${ex.message}`;
    status.className = 'mt-4 text-sm text-red-600';
  }
});

document.getElementById('exportJson').addEventListener('click', () => {
  if (!lastResult) return;
  const blob = new Blob([JSON.stringify(lastResult, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'test_cases.json';
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('exportCsv').addEventListener('click', () => {
  if (!lastResult || !lastResult.raw) return;
  let data;
  try {
    data = JSON.parse(lastResult.raw);
  } catch {
    alert('El resultado no es JSON válido para exportar a CSV');
    return;
  }
  const rows = [];
  rows.push(['ID', 'Título', 'Categoría', 'Prioridad', 'Técnica', 'Precondiciones', 'Pasos', 'Resultado esperado']);
  (data.test_cases || []).forEach(tc => {
    rows.push([
      tc.id || '',
      tc.title || '',
      tc.category || '',
      tc.priority || '',
      (tc.technique_applied || []).join(';'),
      (tc.preconditions || []).join(';'),
      (tc.steps || []).join(';'),
      tc.expected_result || ''
    ]);
  });
  const csv = rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'test_cases.csv';
  a.click();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
